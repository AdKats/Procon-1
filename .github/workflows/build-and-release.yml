name: Build and Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: src/packages
          key: nuget-${{ hashFiles('src/**/packages.config') }}
          restore-keys: nuget-

      - name: Restore NuGet packages
        run: nuget restore src/PRoCon-VS2008E.sln

      - name: Build solution
        run: msbuild src/PRoCon-VS2008E.sln /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: Upload build artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: Procon-Release
          path: builds/Release/
          retention-days: 30

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: src/packages
          key: nuget-${{ hashFiles('src/**/packages.config') }}
          restore-keys: nuget-

      - name: Restore NuGet packages
        run: nuget restore src/PRoCon-VS2008E.sln

      - name: Build solution
        run: msbuild src/PRoCon-VS2008E.sln /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: Verify build output
        run: |
          if (!(Test-Path "builds/Release/PRoCon.exe")) {
            Write-Error "PRoCon.exe not found in build output"
            exit 1
          }
          $version = (Get-Item "builds/Release/PRoCon.exe").VersionInfo.FileVersion
          Write-Host "Built PRoCon version: $version"
        shell: pwsh

      - name: Create release archive
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: Compress-Archive -Path builds/Release/* -DestinationPath "Procon-${env:TAG_NAME}.zip"
        shell: pwsh

      - name: Generate checksums
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $hash = (Get-FileHash "Procon-${env:TAG_NAME}.zip" -Algorithm SHA256).Hash
          "$hash  Procon-${env:TAG_NAME}.zip" | Out-File -Encoding utf8 -FilePath "checksums-sha256.txt"
          Write-Host "SHA256: $hash"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Procon-${{ github.ref_name }}.zip
            checksums-sha256.txt
