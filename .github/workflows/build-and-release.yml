name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Update version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $version = $env:TAG_NAME.TrimStart('v')
          $parts = $version.Split('.')
          while ($parts.Count -lt 4) { $parts += '0' }
          $version = ($parts[0..3]) -join '.'
          Write-Host "Setting version to: $version"
          $file = "src/Directory.Build.props"
          $content = Get-Content $file -Raw
          $content = $content -replace '<Version>.*?</Version>', "<Version>$version</Version>"
          $content = $content -replace '<AssemblyVersion>.*?</AssemblyVersion>', "<AssemblyVersion>$version</AssemblyVersion>"
          $content = $content -replace '<FileVersion>.*?</FileVersion>', "<FileVersion>$version</FileVersion>"
          Set-Content -Path $file -Value $content -NoNewline

      - name: Restore
        run: dotnet restore src/PRoCon.sln

      - name: Build
        run: dotnet build src/PRoCon.sln --configuration Release --no-restore

      - name: Publish Console
        run: dotnet publish src/PRoCon.Console/PRoCon.Console.csproj -c Release -r ${{ matrix.rid }} --self-contained -o publish/console-${{ matrix.rid }}

      - name: Publish UI
        if: matrix.rid != 'linux-arm64'
        run: dotnet publish src/PRoCon.UI/PRoCon.UI.csproj -c Release -r ${{ matrix.rid }} --self-contained -o publish/ui-${{ matrix.rid }}

      - name: Upload artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: procon-${{ matrix.rid }}
          path: publish/
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Create release archives
        shell: bash
        run: |
          cd artifacts
          for dir in procon-*/; do
            rid=$(echo "$dir" | sed 's/procon-//' | sed 's/\///')
            for type in console ui; do
              if [ -d "$dir/$type-$rid" ]; then
                cd "$dir/$type-$rid"
                tar czf "../../../Procon-${type}-${rid}.tar.gz" .
                cd ../..
              fi
            done
          done
          cd ..

      - name: Generate checksums
        run: sha256sum Procon-*.tar.gz > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Procon-*.tar.gz
            checksums-sha256.txt
