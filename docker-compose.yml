services:
  procon:
    build: .
    container_name: procon
    restart: unless-stopped
    ports:
      - "27260:27260"   # SignalR layer port
    volumes:
      - procon-configs:/config/Configs     # Server configs (procon.json, accounts)
      - procon-plugins:/config/Plugins     # Game server plugins (user-editable)
      - procon-logs:/config/Logs           # Connection and chat logs
      - procon-cache:/config/Cache         # IP check cache (SQLite)
    environment:
      PROCON_RCON_HOST: ""          # Game server IP
      PROCON_RCON_PORT: ""          # Game server RCON port
      PROCON_RCON_PASS: ""          # Game server RCON password
      # PROCON_LAYER_ENABLE: "true"
      # PROCON_LAYER_PORT: "27260"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "PRoCon.Console"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  procon-configs:
  procon-plugins:
  procon-logs:
  procon-cache:
