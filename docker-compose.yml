services:
  procon:
    build: .
    container_name: procon
    restart: unless-stopped
    ports:
      - "27260:27260"   # SignalR layer port
    volumes:
      - ./data:/config  # Configs, Plugins, Logs, Cache
    environment:
      # Optional: game server health monitoring
      # - PROCON_GAMESERVER_IP=your.server.ip
      # - PROCON_GAMESERVER_PORT=47200
    healthcheck:
      test: ["CMD", "pgrep", "-f", "PRoCon.Console"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
